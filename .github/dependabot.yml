# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "docker" # See documentation for possible values
    directory: "/claude-sandbox" # Dockerfile lives here, not at repo root
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  # Python-deps van de Maven host-agent. Zonder deze entry scant Dependabot
  # requirements.txt niet (geen pip in de dependency graph), waardoor o.a.
  # cryptography/starlette/python-multipart stil verouderden tot Trivy ze ving.
  - package-ecosystem: "pip"
    directory: "/claude-sandbox/host-agents/maven"
    schedule:
      interval: "weekly"
