name: build-image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Globaal read-only. De build-job zet lokaal packages: write om de image
# naar GHCR te pushen.
permissions:
  contents: read

# Voorkom dat twee snelle pushes parallelle multi-arch builds triggeren.
# Op PR branches mag een nieuwe push de lopende run cancellen (CI-minutes besparen).
# Op main en tags niet, zodat tag-builds niet door een main-push worden afgebroken.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rijksictgilde/claude-sandbox

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write   # OIDC voor cosign keyless signing tegen Sigstore
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # PR builds zijn amd64-only om CI-tijd te besparen; arm64-regressies
      # komen pas op main aan het licht. provenance/sbom blijven aan staan;
      # buildx negeert ze stilzwijgend bij push: false en hangt ze alleen
      # aan de registry-push op main/tag — laat ze hier dus niet weg.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: claude-sandbox
          file: claude-sandbox/Dockerfile
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      # Keyless signing via OIDC: ondertekent de image-digest, niet per tag.
      # Alle tags die naar dezelfde digest wijzen erven daarmee de signature.
      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "Empty digest from build step; refusing to sign." >&2
            exit 1
          fi
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # Verify the signature we just wrote is actually retrievable from
      # Rekor. Catches transient Fulcio/Rekor write failures that cosign
      # sign itself didn't propagate (rare, but ships an unsigned image).
      - name: Verify image signature
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "https://github.com/${REPO_FULL}/.github/workflows/build-image.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
