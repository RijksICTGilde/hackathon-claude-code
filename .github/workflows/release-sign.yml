name: release-sign

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to sign (existing release)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  sign-source:
    name: Sign source archive and attach to release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # upload assets to release
      id-token: write   # OIDC for cosign keyless signing
    steps:
      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            release)        RESOLVED="$RELEASE_TAG" ;;
            workflow_dispatch) RESOLVED="$INPUT_TAG" ;;
            *) echo "Unsupported event: $EVENT_NAME" >&2; exit 1 ;;
          esac
          if [ -z "$RESOLVED" ]; then
            echo "Resolved tag is empty (event=$EVENT_NAME)" >&2
            exit 1
          fi
          # Restrict to safe semver-ish tags so downstream filenames and
          # --prefix paths cannot contain slashes, spaces, or shell metachars.
          if ! printf '%s' "$RESOLVED" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Tag '$RESOLVED' does not match expected semver pattern" >&2
            exit 1
          fi
          echo "name=$RESOLVED" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.tag.outputs.name }}
          persist-credentials: false

      - name: Create source archive
        env:
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          ARCHIVE="${REPO}-${TAG}.tar.gz"
          git archive --format=tar.gz \
            --prefix="${REPO}-${TAG}/" \
            -o "${ARCHIVE}" "${TAG}"
          if [ ! -s "${ARCHIVE}" ]; then
            echo "Source archive is empty: ${ARCHIVE}" >&2
            exit 1
          fi
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          # Roundtrip-verify the checksum file so a silent write failure
          # (disk full, partial write) cannot ship a bogus .sha256 asset.
          sha256sum -c "${ARCHIVE}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign archive with cosign keyless
        env:
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          ARCHIVE="${REPO}-${TAG}.tar.gz"
          cosign sign-blob --yes \
            --output-signature "${ARCHIVE}.sig" \
            --output-certificate "${ARCHIVE}.pem" \
            "${ARCHIVE}"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail
          ARCHIVE="${REPO}-${TAG}.tar.gz"
          gh release upload "${TAG}" \
            "${ARCHIVE}" \
            "${ARCHIVE}.sig" \
            "${ARCHIVE}.pem" \
            "${ARCHIVE}.sha256" \
            --clobber \
            --repo "${REPO_FULL}"

          # Verify all four expected assets actually landed on the release.
          # gh upload returning 0 per asset doesn't guarantee every asset is
          # visible after the call (rare partial-failure mode).
          ASSETS_JSON="$(gh release view "${TAG}" --repo "${REPO_FULL}" --json assets --jq '.assets[].name')"
          for f in "${ARCHIVE}" "${ARCHIVE}.sig" "${ARCHIVE}.pem" "${ARCHIVE}.sha256"; do
            if ! printf '%s\n' "${ASSETS_JSON}" | grep -Fxq "$f"; then
              echo "Missing release asset after upload: $f" >&2
              exit 1
            fi
          done
