name: differential-shellcheck

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  shellcheck:
    name: differential-shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip on PRs from forks: GitHub strips security-events / pull-requests
    # write permissions, which would make SARIF upload + PR-comment posting fail.
    if: |
      (github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Differential ShellCheck
        uses: redhat-plumbers-in-action/differential-shellcheck@d965e66ec0b3b2f821f75c8eff9b12442d9a7d1e # v5.5.6
        with:
          severity: warning
          strict-check-on-push: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
