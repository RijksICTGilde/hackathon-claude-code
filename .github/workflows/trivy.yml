name: Trivy security scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on PRs from forks: GitHub strips security-events permissions
    # from forked-PR runs, which would make the SARIF upload fail.
    if: |
      (github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Fail the workflow on CRITICAL/HIGH findings so PRs cannot land
      # while ignoring them. The SARIF run below stays informational.
      - name: Trivy fail-on-findings (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          exit-code: '1'

      - name: Trivy SARIF for code-scanning dashboard
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          scanners: vuln,secret,misconfig

      - name: Upload to code-scanning
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b20883b0cd1f46c72ae0ba6d1090936928f9fa30 # v4.32.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy
