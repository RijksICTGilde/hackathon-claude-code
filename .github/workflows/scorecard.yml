name: Scorecard supply-chain security

on:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#maintained
  schedule:
    - cron: '24 12 * * 0'
  push:
    branches: [ "main" ]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # OSSF webapp eist dat dit job alléén `uses:`-stappen bevat; één enkele
    # `run:`-stap (zelfs alleen voor logging) laat publish_results falen met
    # HTTP 400 "scorecard job must only have steps with `uses`", waardoor
    # de scorecard.dev-badge "invalid repo path" toont. Diagnostiek staat
    # daarom in een aparte `diagnostics`-job hieronder.
    # https://github.com/ossf/scorecard-action#workflow-restrictions
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Only takes effect on the default branch on push/schedule; the
          # action skips publishing otherwise. De diagnostics-job rendert
          # diezelfde branching expliciet zodat publish-state zichtbaar
          # is in de run-log — niet weghalen, de scorecard-action logt
          # zelf niet of publishing gevraagd-maar-overgeslagen werd,
          # waardoor anders onduidelijk blijft of de badge verversd is
          # of stale data toont.
          publish_results: true

      # `if-no-files-found: error` vangt de scanner-crash-zonder-SARIF case
      # af; een 0-byte SARIF wordt door de codeql/upload-sarif schema-validatie
      # alsnog afgewezen. Een aparte `[ ! -s results.sarif ]`-check zou een
      # `run:`-stap zijn en is in dit job niet toegestaan (zie comment boven);
      # die check staat in de diagnostics-job als belt-and-suspenders.
      - name: "Upload artifact"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
          if-no-files-found: error

      - name: "Upload to code-scanning"
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif

  diagnostics:
    name: Scorecard diagnostics
    needs: analysis
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: "Download SARIF artifact"
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: SARIF file

      # Belt-and-suspenders: vangt het geval dat results.sarif wel bestaat
      # maar 0 bytes is. `if-no-files-found: error` op de upload-stap dekt
      # alleen ontbrekende files, niet lege.
      - name: "Validate SARIF non-empty"
        if: always()
        run: |
          set -euo pipefail
          if [ ! -s results.sarif ]; then
            echo "results.sarif is missing or empty" >&2
            exit 1
          fi

      - name: "Log run mode"
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          PUBLISHED="no (badge will use last published run)"
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "schedule" ]; then
            if [ "$REF" = "refs/heads/${DEFAULT_BRANCH}" ] || [ "$EVENT_NAME" = "schedule" ]; then
              PUBLISHED="yes"
            fi
          fi
          echo "Trigger: $EVENT_NAME on $REF"
          echo "publish_results effective: $PUBLISHED"
