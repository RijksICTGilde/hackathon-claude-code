services:
  claude:
    build:
      context: .
      args:
        # Geen :-default hier: typfouten in .env moeten zichtbaar falen i.p.v. stil terugvallen
        INSTALL_JVM: "${INSTALL_JVM:?stel INSTALL_JVM in op true of false in .env}"
        INSTALL_DOCKER: "${INSTALL_DOCKER:?stel INSTALL_DOCKER in op true of false in .env}"
        INSTALL_RTK: "${INSTALL_RTK:?stel INSTALL_RTK in op true of false in .env}"
        INSTALL_OVERHEID_PLUGINS: "${INSTALL_OVERHEID_PLUGINS:?stel INSTALL_OVERHEID_PLUGINS in op true of false in .env}"
        INSTALL_ANTHROPIC_PLUGINS: "${INSTALL_ANTHROPIC_PLUGINS:?stel INSTALL_ANTHROPIC_PLUGINS in op true of false in .env}"
        INSTALL_LOCAL_SKILLS: "${INSTALL_LOCAL_SKILLS:?stel INSTALL_LOCAL_SKILLS in op true of false in .env}"
        INSTALL_CAVEMAN: "${INSTALL_CAVEMAN:?stel INSTALL_CAVEMAN in op true of false in .env}"
    container_name: claude-sandbox
    # privileged volgt INSTALL_DOCKER (zie README voor waarom, en de
    # security-trade-off).
    privileged: ${INSTALL_DOCKER:?stel INSTALL_DOCKER in op true of false in .env}
    # NET_ADMIN/NET_RAW nodig voor de firewall (iptables/ipset). Bij
    # privileged: true hebben deze geen extra effect; bij false zijn ze
    # noodzakelijk — zonder lukt iptables -L niet en faalt init-firewall.sh.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    stdin_open: true
    tty: true
    init: true
    environment:
      - ANTHROPIC_API_KEY
      - OPEN_HTTPS
      - ALLOWED_DOMAINS
    volumes:
      - claude-home:/home/claude
      - ${PROJECTS_DIR:-./projects}:/home/claude/projects

volumes:
  claude-home:
    external: true
